system_id: samgraha-documentation
domain: feature
standard_id: documentation-standards
scope: document
kind: deterministic

description: "Whole-document deterministic rules for Feature Documentation. Validates structural completeness, modularity, and collection-level properties that can be checked without LLM judgment."

rules:
  # --- Collection completeness ---
  - id: feat-doc-001
    description: "Required sections present"
    condition: "document contains all required sections per documentation-standards Required Sections table"
    message: "Feature document is missing required sections"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      required_semantic_types:
        - purpose
        - functional_requirements
        - acceptance_criteria

  - id: feat-doc-002
    description: "No empty required sections"
    condition: "every required section has non-empty content (not just a heading)"
    message: "Required section exists but has no content"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: section_content
      check: non_empty

  # --- Modularity ---
  - id: feat-doc-003
    description: "Document covers one feature"
    condition: "document has a single primary focus — does not mix unrelated feature concerns"
    message: "Document covers multiple unrelated features; consider splitting"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: heading_analysis
      check: single_concern

  # --- Technology independence ---
  - id: feat-doc-004
    description: "No implementation technology references"
    condition: "document does not name specific programming languages, frameworks, libraries, APIs, database schemas, or protocols"
    message: "Feature document contains implementation technology references"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries
        - database_schemas
        - protocols

  # --- Cross-references ---
  - id: feat-doc-005
    description: "Required cross-references present"
    condition: "document references upstream standards (Vision, Philosophy) and downstream standards (Feature Design, Feature Technical) where applicable"
    message: "Feature document is missing expected cross-references"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: vision
          direction: derives_from
        - domain: philosophy
          direction: guided_by

  # --- Duplicate content ---
  - id: feat-doc-006
    description: "No duplicate content within document"
    condition: "no section repeats the same information as another section"
    message: "Feature document contains duplicate content across sections"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_deduplication
      scope: within_document
