system_id: samgraha-documentation
domain: qa

# Relationship ownership: each entry declares which level (section or document)
# is responsible for checking this relationship. No relationship appears in
# both a section prompt and a document prompt — the owner field prevents it.
#
# QA is standalone — no upstream/downstream derivation relationships.
# All relationships are cross-reference edges to related domains.

relationships:
  # --- Section-owned: outgoing edges from this section ---
  - id: qa-strategy-derives-architecture
    from_section: test_strategy
    type: derives_from
    target_domain: architecture
    target_section: system_overview
    owner: section

  - id: qa-unit-derives-engineering
    from_section: unit_testing
    type: derives_from
    target_domain: engineering
    target_section: testing_standards
    owner: section

  - id: qa-integration-derives-architecture
    from_section: integration_testing
    type: derives_from
    target_domain: architecture
    target_section: communication_paths
    owner: section

  - id: qa-security-derives-security
    from_section: security_testing
    type: derives_from
    target_domain: security
    target_section: threat_model
    owner: section

  - id: qa-purpose-derives-vision
    from_section: purpose
    type: derives_from
    target_domain: vision
    target_section: purpose
    owner: section

  # --- Document-owned: cross-section patterns ---
  - id: qa-section-consistency
    type: section_consistency
    description: "Sections within QA docs are mutually consistent — test strategy aligns with unit, integration, and security testing"
    owner: document

  - id: qa-collection-coherence
    type: collection_coherence
    description: "All QA documents in the domain cohere as one system — no orphaned or contradictory test plans"
    owner: document

  - id: qa-terminology-drift
    type: terminology_drift
    description: "Terminology is consistent across all QA sections — same concept, same name"
    owner: document
