system_id: samgraha-documentation
domain: build
standard_id: documentation-standards
scope: document
kind: deterministic

description: "Whole-document deterministic rules for Build Documentation. Validates documentation quality, security checks, and versioning practices that can be checked without LLM judgment."

rules:
  # --- Collection completeness ---
  - id: build-doc-001
    description: "Required sections present"
    condition: "document contains all required sections per documentation-standards Build requirements"
    message: "Build document is missing required sections"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      required_semantic_types:
        - documentation_quality
        - security_checks
        - versioning_naming

  - id: build-doc-002
    description: "No empty required sections"
    condition: "every required section has non-empty content (not just a heading)"
    message: "Required section exists but has no content"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: section_content
      check: non_empty

  # --- Modularity ---
  - id: build-doc-003
    description: "Document covers one build concern"
    condition: "document has a single primary focus — does not mix unrelated build configurations"
    message: "Document covers multiple unrelated build concerns; consider splitting"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: heading_analysis
      check: single_concern

  # --- Derivation completeness ---
  - id: build-doc-004
    description: "Document derives from Implementation"
    condition: "document references upstream Implementation Documentation"
    message: "Build document does not derive from Implementation Documentation"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: cross_reference
      expected:
        - domain: implementation
          direction: derives_from

  # --- Cross-references ---
  - id: build-doc-005
    description: "Required cross-references present"
    condition: "document references downstream Readme Documentation where applicable"
    message: "Build document is missing expected downstream cross-references"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: readme
          direction: derives_to

  # --- Duplicate content ---
  - id: build-doc-006
    description: "No duplicate content within document"
    condition: "no section repeats the same information as another section"
    message: "Build document contains duplicate content across sections"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_deduplication
      scope: within_document
