system_id: documentation-standards
domain: design
standard_id: documentation-standards
scope: document
kind: deterministic

description: "Whole-document deterministic rules for Design Documentation. Validates structural completeness, modularity, and collection-level properties that can be checked without LLM judgment."

rules:
  # --- Collection completeness ---
  - id: design-doc-001
    description: "Required sections present"
    condition: "document contains all required sections per documentation-standards Required Sections table"
    message: "Design document is missing required sections"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      required_semantic_types:
        - design_principles
        - ux_principles
        - accessibility

  - id: design-doc-002
    description: "No empty required sections"
    condition: "every required section has non-empty content (not just a heading)"
    message: "Required section exists but has no content"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: section_content
      check: non_empty

  # --- Modularity ---
  - id: design-doc-003
    description: "Document covers one design concern"
    condition: "document has a single primary focus — does not mix unrelated design concerns"
    message: "Document covers multiple unrelated design concerns; consider splitting"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: heading_analysis
      check: single_concern

  # --- Technology independence ---
  - id: design-doc-004
    description: "No implementation technology references"
    condition: "document does not name specific programming languages, frameworks, libraries, APIs, database schemas, or protocols"
    message: "Design document contains implementation technology references"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries
        - database_schemas
        - protocols

  # --- Cross-references ---
  - id: design-doc-005
    description: "Required cross-references present"
    condition: "document references upstream standards (Philosophy) and downstream standards (Feature Design) where applicable"
    message: "Design document is missing expected cross-references"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: philosophy
          direction: guided_by

  # --- Duplicate content ---
  - id: design-doc-006
    description: "No duplicate content within document"
    condition: "no section repeats the same information as another section"
    message: "Design document contains duplicate content across sections"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_deduplication
      scope: within_document
