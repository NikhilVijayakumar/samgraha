system_id: documentation-standards
domain: engineering

# Relationship ownership: each entry declares which level (section or document)
# is responsible for checking this relationship. No relationship appears in
# both a section prompt and a document prompt — the owner field prevents it.
#
# See proposal.md §10.4 for the assignment rules.

relationships:
  # --- Section-owned: outgoing edges from this section ---
  - id: eng-purpose-derives-philosophy
    from_section: purpose
    type: derives_from_from
    target_domain: philosophy
    target_section: purpose
    owner: section

  - id: eng-purpose-guided-by-philosophy
    from_section: purpose
    type: guided_by
    target_domain: philosophy
    target_section: guiding_principles
    owner: section

  - id: eng-guiding-guided-by-philosophy
    from_section: guiding_principles
    type: guided_by
    target_domain: philosophy
    target_section: guiding_principles
    owner: section

  - id: eng-guiding-derives-philosophy
    from_section: guiding_principles
    type: derives_from_from
    target_domain: philosophy
    target_section: rationale
    owner: section

  - id: eng-rationale-derives-philosophy
    from_section: rationale
    type: derives_from_from
    target_domain: philosophy
    target_section: rationale
    owner: section

  - id: eng-rationale-informs-guiding
    from_section: rationale
    type: informs
    target_domain: engineering
    target_section: guiding_principles
    owner: section

  - id: eng-build-derives-arch
    from_section: build_standards
    type: derives_from_from
