  # --- Document-owned: cross-section patterns ---
  - id: eng-section-consistency
    type: section_consistency
    description: "Sections within engineering docs are mutually consistent — no contradictions between guiding_principles, build_standards, testing_standards, and code_standards"
    owner: document

  - id: eng-collection-coherence
    type: collection_coherence
    description: "All engineering documents in the domain cohere as one system — no orphaned or contradictory documents"
    owner: document

  - id: eng-terminology-drift
