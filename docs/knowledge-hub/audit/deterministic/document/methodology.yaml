Document of type `research-paper` must contain a section titled `Methodology`
(or equivalent heading such as `Methods`, `Approach`, `Experimental Design`).

## Pass

- Section exists with recognized heading variant
- Section appears after Introduction and before Results

## Fail

- No methodology section found
- Methodology section appears after Results/Conclusion
