domain: qa
standard_id: documentation-standards
scope: document
kind: deterministic

description: "Whole-document deterministic rules for QA Documentation. Validates test strategy completeness, coverage breadth, and security testing rigor that can be checked without LLM judgment."

rules:
  # --- Collection completeness ---
  - id: qa-doc-001
    description: "Required sections present"
    condition: "document contains all required sections per documentation-standards QA requirements"
    message: "QA document is missing required sections"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      required_semantic_types:
        - test_strategy
        - unit_testing
        - integration_testing
        - security_testing

  - id: qa-doc-002
    description: "No empty required sections"
    condition: "every required section has non-empty content (not just a heading)"
    message: "Required section exists but has no content"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: section_content
      check: non_empty

  # --- Modularity ---
  - id: qa-doc-003
    description: "Document covers one testing concern"
    condition: "document has a single primary focus — does not mix unrelated testing strategies"
    message: "Document covers multiple unrelated testing concerns; consider splitting"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: heading_analysis
      check: single_concern

  # --- Coverage completeness ---
  - id: qa-doc-004
    description: "Test strategy covers all testing levels"
    condition: "document addresses unit, integration, and security testing levels"
    message: "QA document does not cover all required testing levels"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: section_presence
      required_semantic_types:
        - unit_testing
        - integration_testing
        - security_testing

  # --- Cross-references ---
  - id: qa-doc-005
    description: "Required cross-references present"
    condition: "document references upstream standards (Architecture, Engineering, Security) where applicable"
    message: "QA document is missing expected cross-references"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: architecture
          direction: derives_from
        - domain: engineering
          direction: derives_from
        - domain: security
          direction: derives_from

  # --- Duplicate content ---
  - id: qa-doc-006
    description: "No duplicate content within document"
    condition: "no section repeats the same information as another section"
    message: "QA document contains duplicate content across sections"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_deduplication
      scope: within_document
