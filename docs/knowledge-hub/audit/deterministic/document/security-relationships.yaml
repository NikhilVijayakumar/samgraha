system_id: documentation-standards
domain: security

# Relationship ownership: each entry declares which level (section or document)
# is responsible for checking this relationship. No relationship appears in
# both a section prompt and a document prompt — the owner field prevents it.
#
# See proposal.md §10.4 for the assignment rules.

