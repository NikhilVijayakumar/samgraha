system_id: samgraha-documentation
standard_id: documentation-standards
domain: security
section_type: compliance
scope: section
kind: deterministic

rules:
  - id: security-sec-compliance-001
    description: "Compliance section exists"
    condition: "document has a section with semantic_type = 'compliance'"
    message: "Missing required 'Compliance' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "compliance"

  - id: security-sec-compliance-002
    description: "Compliance has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Compliance section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: security-sec-compliance-003
    description: "Compliance is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Compliance contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "security"
