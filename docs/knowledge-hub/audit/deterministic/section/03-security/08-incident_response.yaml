system_id: samgraha-documentation
standard_id: documentation-standards
domain: security
section_type: incident_response
scope: section
kind: deterministic

rules:
  - id: security-sec-incident_response-001
    description: "Incident Response section exists"
    condition: "document has a section with semantic_type = 'incident_response'"
    message: "Missing required 'Incident Response' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "incident_response"

  - id: security-sec-incident_response-002
    description: "Incident Response has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Incident Response section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: security-sec-incident_response-003
    description: "Incident Response is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Incident Response contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "security"
