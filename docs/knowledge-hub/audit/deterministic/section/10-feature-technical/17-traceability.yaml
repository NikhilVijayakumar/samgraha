system_id: samgraha-documentation
domain: feature-technical
section_type: traceability
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: ft-sec-trace-001
    description: "Traceability section exists"
    condition: "document has a section with semantic_type = 'traceability'"
    message: "Missing optional 'Traceability' section"
    severity: info
    weight: 0.3
    mandatory: false
    evidence:
      type: section_presence
      semantic_type: "traceability"

  - id: ft-sec-trace-002
    description: "Traceability links to upstream domains"
    condition: "section contains references back to Feature, Engineering, Architecture, or External Context that informed the technical specification"
    message: "Traceability section does not link to upstream domains"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "derived from"
        - "informed by"
        - "traceable"
        - "links to"

  - id: ft-sec-trace-003
    description: "Traceability links to downstream implementation"
    condition: "section contains forward references to Implementation that consume this technical specification"
    message: "Traceability section does not link to downstream implementation"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "implemented by"
        - "consumed by"
        - "realized in"
        - "applied to"

