system_id: samgraha-documentation
standard_id: documentation-standards
domain: qa
section_type: e2e_testing
scope: section
kind: deterministic

rules:
  - id: qa-sec-e2e_testing-001
    description: "E2E Testing section exists"
    condition: "document has a section with semantic_type = 'e2e_testing'"
    message: "Missing required 'E2E Testing' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "e2e_testing"

  - id: qa-sec-e2e_testing-002
    description: "E2E Testing has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "E2E Testing section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: qa-sec-e2e_testing-003
    description: "E2E Testing is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "E2E Testing contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "qa"
