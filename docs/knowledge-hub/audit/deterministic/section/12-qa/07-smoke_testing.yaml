system_id: samgraha-documentation
standard_id: documentation-standards
domain: qa
section_type: smoke_testing
scope: section
kind: deterministic

rules:
  - id: qa-sec-smoke_testing-001
    description: "Smoke Testing section exists"
    condition: "document has a section with semantic_type = 'smoke_testing'"
    message: "Missing required 'Smoke Testing' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "smoke_testing"

  - id: qa-sec-smoke_testing-002
    description: "Smoke Testing has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Smoke Testing section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: qa-sec-smoke_testing-003
    description: "Smoke Testing is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Smoke Testing contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "qa"
