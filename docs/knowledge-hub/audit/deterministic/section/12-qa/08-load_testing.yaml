system_id: samgraha-documentation
standard_id: documentation-standards
domain: qa
section_type: load_testing
scope: section
kind: deterministic

rules:
  - id: qa-sec-load_testing-001
    description: "Load Testing section exists"
    condition: "document has a section with semantic_type = 'load_testing'"
    message: "Missing required 'Load Testing' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "load_testing"

  - id: qa-sec-load_testing-002
    description: "Load Testing has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Load Testing section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: qa-sec-load_testing-003
    description: "Load Testing is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Load Testing contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "qa"
