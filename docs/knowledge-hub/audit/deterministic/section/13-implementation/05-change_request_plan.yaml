system_id: samgraha-documentation
standard_id: documentation-standards
domain: implementation
section_type: change_request_plan
scope: section
kind: deterministic

rules:
  - id: implementation-sec-change_request_plan-001
    description: "Change Request Plan section exists"
    condition: "document has a section with semantic_type = 'change_request_plan'"
    message: "Missing required 'Change Request Plan' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "change_request_plan"

  - id: implementation-sec-change_request_plan-002
    description: "Change Request Plan has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Change Request Plan section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: implementation-sec-change_request_plan-003
    description: "Change Request Plan is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Change Request Plan contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "implementation"
