system_id: samgraha-documentation
standard_id: documentation-standards
domain: implementation
section_type: enhancement_plan
scope: section
kind: deterministic

rules:
  - id: implementation-sec-enhancement_plan-001
    description: "Enhancement Plan section exists"
    condition: "document has a section with semantic_type = 'enhancement_plan'"
    message: "Missing required 'Enhancement Plan' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "enhancement_plan"

  - id: implementation-sec-enhancement_plan-002
    description: "Enhancement Plan has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Enhancement Plan section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: implementation-sec-enhancement_plan-003
    description: "Enhancement Plan is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Enhancement Plan contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "implementation"
