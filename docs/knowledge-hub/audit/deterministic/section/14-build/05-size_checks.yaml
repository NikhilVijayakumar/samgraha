system_id: samgraha-documentation
standard_id: documentation-standards
domain: build
section_type: size_checks
scope: section
kind: deterministic

rules:
  - id: build-sec-size_checks-001
    description: "Size Checks section exists"
    condition: "document has a section with semantic_type = 'size_checks'"
    message: "Missing required 'Size Checks' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "size_checks"

  - id: build-sec-size_checks-002
    description: "Size Checks has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Size Checks section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: build-sec-size_checks-003
    description: "Size Checks is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Size Checks contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "build"
