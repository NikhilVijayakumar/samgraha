system_id: samgraha-documentation
standard_id: documentation-standards
domain: build
section_type: ml_artifact_management
scope: section
kind: deterministic

rules:
  - id: build-sec-ml_artifact_management-001
    description: "Ml Artifact Management section exists"
    condition: "document has a section with semantic_type = 'ml_artifact_management'"
    message: "Missing required 'Ml Artifact Management' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "ml_artifact_management"

  - id: build-sec-ml_artifact_management-002
    description: "Ml Artifact Management has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Ml Artifact Management section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: build-sec-ml_artifact_management-003
    description: "Ml Artifact Management is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Ml Artifact Management contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "build"
