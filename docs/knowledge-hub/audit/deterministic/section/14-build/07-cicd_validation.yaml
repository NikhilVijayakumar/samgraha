system_id: samgraha-documentation
standard_id: documentation-standards
domain: build
section_type: cicd_validation
scope: section
kind: deterministic

rules:
  - id: build-sec-cicd_validation-001
    description: "Cicd Validation section exists"
    condition: "document has a section with semantic_type = 'cicd_validation'"
    message: "Missing required 'Cicd Validation' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "cicd_validation"

  - id: build-sec-cicd_validation-002
    description: "Cicd Validation has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Cicd Validation section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: build-sec-cicd_validation-003
    description: "Cicd Validation is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Cicd Validation contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "build"
