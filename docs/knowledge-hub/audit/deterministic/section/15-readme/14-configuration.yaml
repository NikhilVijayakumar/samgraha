system_id: samgraha-documentation
standard_id: documentation-standards
domain: readme
section_type: configuration
scope: section
kind: deterministic

rules:
  - id: readme-sec-configuration-001
    description: "Configuration section exists"
    condition: "document has a section with semantic_type = 'configuration'"
    message: "Missing required 'Configuration' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "configuration"

  - id: readme-sec-configuration-002
    description: "Configuration has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Configuration section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: readme-sec-configuration-003
    description: "Configuration is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Configuration contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "readme"
