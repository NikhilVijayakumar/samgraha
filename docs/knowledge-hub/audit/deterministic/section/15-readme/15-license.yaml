system_id: samgraha-documentation
standard_id: documentation-standards
domain: readme
section_type: license
scope: section
kind: deterministic

rules:
  - id: readme-sec-license-001
    description: "License section exists"
    condition: "document has a section with semantic_type = 'license'"
    message: "Missing required 'License' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "license"

  - id: readme-sec-license-002
    description: "License has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "License section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: readme-sec-license-003
    description: "License is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "License contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "readme"
