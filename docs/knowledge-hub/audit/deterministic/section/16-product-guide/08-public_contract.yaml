system_id: samgraha-documentation
standard_id: documentation-standards
domain: product-guide
section_type: public_contract
scope: section
kind: deterministic

rules:
  - id: product-guide-sec-public_contract-001
    description: "Public Contract section exists"
    condition: "document has a section with semantic_type = 'public_contract'"
    message: "Missing required 'Public Contract' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "public_contract"

  - id: product-guide-sec-public_contract-002
    description: "Public Contract has substantive content"
    condition: "section contains at least one paragraph of project-specific content"
    message: "Public Contract section is empty or placeholder only"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      min_length: 100

  - id: product-guide-sec-public_contract-003
    description: "Public Contract is specific to this project"
    condition: "section contains project-specific details, not generic boilerplate"
    message: "Public Contract contains generic content"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "product-guide"
