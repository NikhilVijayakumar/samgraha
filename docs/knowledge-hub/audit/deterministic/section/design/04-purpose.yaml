domain: design
section_type: purpose
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: design-sec-purpose-001
    description: "Purpose section exists"
    condition: "document has a section with semantic_type = 'purpose'"
    message: "Missing 'Purpose' section"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: section_presence
      semantic_type: "purpose"

  - id: design-sec-purpose-002
    description: "Purpose states design intent"
    condition: "section contains a statement of why this design documentation exists"
    message: "Purpose section does not state design intent"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "design"
        - "purpose"
        - "intent"

  - id: design-sec-purpose-003
    description: "Purpose is technology-independent"
    condition: "section does not reference specific technologies, frameworks, or implementation details"
    message: "Purpose section contains implementation technology references"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries

  - id: design-sec-purpose-004
    description: "Purpose scope boundaries defined"
    condition: "section defines what the design documentation covers and does not cover"
    message: "Purpose section does not define scope boundaries"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      patterns:
        - "unlike"
        - "not"
        - "does not"

relationships:
    - type: guided_by
      target_domain: philosophy
      target_section: guiding_principles
      bidirectional: false
