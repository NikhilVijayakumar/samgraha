domain: design
section_type: traceability
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: design-sec-trace-001
    description: "Traceability section exists"
    condition: "document has a section with semantic_type = 'traceability'"
    message: "Missing 'Traceability' section"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: section_presence
      semantic_type: "traceability"

  - id: design-sec-trace-002
    description: "Traceability links to philosophy"
    condition: "section traces design back to philosophy principles"
    message: "Design does not trace back to philosophy"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: philosophy
          direction: traceable_to

  - id: design-sec-trace-003
    description: "Traceability links to downstream"
    condition: "section identifies downstream artifacts that derive from this design"
    message: "Design does not identify downstream derivations"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: feature_design
          direction: derives
