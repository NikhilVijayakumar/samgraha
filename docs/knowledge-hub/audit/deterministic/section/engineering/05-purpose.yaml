domain: engineering
section_type: purpose
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: eng-sec-purpose-001
    description: "Purpose section exists"
    condition: "document has a section with semantic_type = 'purpose'"
    message: "Missing optional 'Purpose' section"
    severity: info
    weight: 0.3
    mandatory: false
    evidence:
      type: section_presence
      semantic_type: "purpose"

  - id: eng-sec-purpose-002
    description: "Purpose states engineering intent"
    condition: "section contains a statement of why Engineering Documentation exists"
    message: "Purpose section does not state engineering intent"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      keywords:
        - "engineering"
        - "standard"
        - "documentation"
        - "purpose"

  - id: eng-sec-purpose-003
    description: "Purpose is technology-independent"
    condition: "section does not reference specific technologies, frameworks, or implementation details"
    message: "Purpose section contains implementation technology references"
    severity: error
    weight: 1.0
    mandatory: false
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries

relationships:
    - type: derives_from
      target_domain: philosophy
      target_section: purpose
      bidirectional: false
    - type: guided_by
      target_domain: philosophy
      target_section: guiding_principles
      bidirectional: false
