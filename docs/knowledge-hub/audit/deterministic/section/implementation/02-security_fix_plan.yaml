system_id: documentation-standards
domain: implementation
section_type: security_fix_plan
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: impl-sec-fix-001
    description: "Security fix plan section exists"
    condition: "document has a section with semantic_type = 'security_fix_plan'"
    message: "Missing required 'Security Fix Plan' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "security_fix_plan"

  - id: impl-sec-fix-002
    description: "Security fix plan defines fixes"
    condition: "section contains at least one security fix or remediation step"
    message: "Security fix plan section has no fixes defined"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      patterns:
        - "fix"
        - "remediation"
        - "patch"
        - "mitigation"

  - id: impl-sec-fix-003
    description: "Security fix plan references security standard"
    condition: "section references Security Documentation threat model or mitigation strategies"
    message: "Security fix plan does not reference Security Documentation"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: security
          direction: derives_from

  - id: impl-sec-fix-004
    description: "Security fix plan traces to threats"
    condition: "each fix references the specific threat or vulnerability it addresses"
    message: "Security fixes do not trace to specific threats"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: cross_reference
      expected:
        - domain: security
          direction: traceable_to

relationships:
    - type: derives_from
      target_domain: security
      target_section: threat_model
      bidirectional: false
    - type: traceable_to
      target_domain: security
      target_section: mitigation_strategies
      bidirectional: false
