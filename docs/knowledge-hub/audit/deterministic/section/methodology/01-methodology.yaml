system_id: research-paper-publishing
standard_id: rp-methodology
domain: methodology
section_type: methodology
scope: section
kind: deterministic

rules:
  - id: RP-M-1
    description: "Methodology section exists and has content"
    condition: "section exists with at least one paragraph describing research approach, data collection, and analysis"
    message: "Methodology section is missing or empty"
    severity: Critical
    weight: 2.0
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: methodology
      min_paragraphs: 1

  - id: RP-M-2
    description: "Methodology describes data collection approach"
    condition: "section contains description of data collection method"
    message: "Methodology section does not describe data collection approach"
    severity: Warning
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      keywords:
        - "data collection"
        - "sampling"
        - "survey"
        - "interview"
        - "experiment"
        - "observation"

  - id: RP-M-3
    description: "Methodology describes analysis technique"
    condition: "section contains description of analysis technique"
    message: "Methodology section does not describe analysis technique"
    severity: Warning
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      keywords:
        - "analysis"
        - "statistical"
        - "qualitative"
        - "quantitative"
        - "thematic"
        - "regression"

  - id: RP-M-4
    description: "Methodology cites relevant prior work"
    condition: "section includes at least one citation to prior methodology literature"
    message: "Methodology section does not reference prior work"
    severity: Warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      patterns:
        - "\\[\\d+\\]"
        - "et al."
