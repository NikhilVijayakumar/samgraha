## Check

Section `methodology` must exist and contain at least one paragraph describing
the research approach, data collection method, and analysis technique.

## Pass

- Section exists with ≥1 paragraph
- Describes data collection approach
- Describes analysis technique

## Fail

- Section missing entirely
- Section present but empty or placeholder only
