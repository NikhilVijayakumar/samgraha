## Check

Section `methodology` must include at least one citation or reference to prior work
that justifies or contextualizes the chosen approach.

## Pass

- At least one citation present
- Reference is contextually relevant to methodology choice

## Fail

- No citations in methodology section
- Citations present but unrelated to methodology
