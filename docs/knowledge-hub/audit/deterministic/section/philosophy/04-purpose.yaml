system_id: documentation-standards
domain: philosophy
section_type: purpose
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: phil-sec-purpose-001
    description: "Purpose section exists"
    condition: "document has a section with semantic_type = 'purpose'"
    message: "Missing required 'Purpose' section"
    severity: error
    weight: 1.5
    mandatory: true
    evidence:
      type: section_presence
      semantic_type: "purpose"

  - id: phil-sec-purpose-002
    description: "Purpose states philosophical intent"
    condition: "section contains a statement of why Philosophy Documentation exists"
    message: "Purpose section does not state philosophical intent"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: content_check
      keywords:
        - "philosophy"
        - "principles"
        - "values"
        - "decisions"

  - id: phil-sec-purpose-003
    description: "Purpose is technology-independent"
    condition: "section does not reference specific technologies, frameworks, or implementation details"
    message: "Purpose section contains implementation technology references"
    severity: error
    weight: 1.0
    mandatory: true
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries

  - id: phil-sec-purpose-004
    description: "Purpose scope boundaries defined"
    condition: "section defines what Philosophy Documentation is and is not"
    message: "Purpose section does not define scope boundaries"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: content_check
      patterns:
        - "unlike"
        - "not"
        - "does not"

relationships:
    - type: derives_from
      target_domain: vision
      target_section: purpose
      bidirectional: false
    - type: guided_by
      target_domain: philosophy
      target_section: guiding_principles
      bidirectional: false
