system_id: documentation-standards
domain: vision
section_type: guiding_principles
standard_id: documentation-standards
scope: section
kind: deterministic

rules:
  - id: vis-sec-gp-001
    description: "Guiding Principles section exists"
    condition: "document has a section with semantic_type = 'guiding_principles'"
    message: "Missing optional 'Guiding Principles' section"
    severity: suggestion
    weight: 0.3
    mandatory: false
    evidence:
      type: section_presence
      semantic_type: "guiding_principles"

  - id: vis-sec-gp-002
    description: "Guiding Principles are technology-independent"
    condition: "section does not reference specific technologies, frameworks, or implementation details"
    message: "Guiding Principles section contains implementation technology references"
    severity: warning
    weight: 0.5
    mandatory: false
    evidence:
      type: keyword_absence
      categories:
        - programming_languages
        - frameworks
        - libraries

  - id: vis-sec-gp-003
    description: "Guiding Principles list at least three principles"
    condition: "section lists three or more guiding principles"
    message: "Guiding Principles section should list at least three principles"
    severity: suggestion
    weight: 0.3
    mandatory: false
    evidence:
      type: list_count
      min: 3

relationships:
    - type: inspires
      target_domain: philosophy
      target_section: guiding_principles
      bidirectional: false
