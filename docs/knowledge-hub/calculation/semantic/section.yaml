id: semantic_section_v1
calculation: sum_capped_at_100
scope: section
inputs:
  from: audit/semantic/section/{domain}/*.md
  fields: [criterion_id, points, mandatory, passed, section_type]
formula: |
  section_score = min(100, sum(points) where passed=true)
rollup:
  method: average
  over: section scores, sections actually present only
  note: >
    Unweighted average across sections present in the document.
    A section absent from the document (among optional ones) is excluded,
    not scored as zero — presence is a deterministic concern, not a semantic one.
    Each section's own sum_capped_at_100 already reflects its criteria points;
    the rollup does not re-weight sections against each other.
