[repository]
dependencies = []
id = "samgraha"
name = "samgraha"
uuid = "b64ef95b-9b24-4d59-9b4c-e47848242af9"
source_exclude = []

[repository.ignore]
patterns = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/audit-standards/**",
    "**/report/**",
    "**/reports/**",
    "**/test.md",
    "**/manual-audit.md",
    "**/standards/**",
    "**/help/**",
    "**/release/**",
    "**/.agents/**",
    "**/rules/**",
    "**/.opencode/**",
    "**/.gsd/**",
    "**/.claude/**",
]

[repository.documentation]
# Absolute path resolved from SAMGRAHA_DOCS_DIR (see .env) — falls back to
# <repo>/docs if unset. Absolute avoids relative-path ambiguity across
# multiple developer machines and multi-repo MCP sessions.
root_dir = "${SAMGRAHA_DOCS_DIR}"
domain = ["readme", "vision", "philosophy", "architecture", "feature", "feature-design", "feature-technical", "design", "engineering", "external-context", "prototype", "help", "standards"]
# This repo doesn't have docs for these builtin standards — see FR5a in
# docs/raw/feature/cli-interface.md and the Domain Exclusions section in
# docs/raw/feature-technical/cli-interface.md.
# help/standards are excluded here too: they're built-in knowledge compiled
# separately by the release script (--path docs/raw/product-guide). knowledge.db
# ships as an empty schema — users register their Knowledge System with
# `standards register` which populates the local DB and syncs to the global
# store. Exclusion only affects the `info` standards list — see
# [repository.ignore].patterns above for the real compile-time safeguard.
domain_exclusion = ["design", "feature-design", "external-context", "prototype", "help", "standards"]

# Check overrides — map check name to script path (relative to repo root).
# Highest priority in the resolution chain: check_overrides -> scripts/ ->
# .samgraha/scripts/ -> mcp-adjacent scripts/ (system defaults).
#
# samgraha treats itself as just another repo: its 18 check scripts live in
# scripts/*.ps1 as thin wrappers delegating to docs/knowledge-hub/script/ (the
# samgraha-documentation system's own script source — data, same status as
# docs/knowledge-hub/audit/, .../templates/, etc.). That's Tier 2 (repo-local
# scripts/, auto-resolved by name, no config needed) — nothing in crates/
# knows docs/knowledge-hub/ exists, and this section stays empty. A different
# repo puts its own scripts/<check-name>.{sh,ps1} here the same way; only use
# check_overrides below for a path that isn't just scripts/<name>.
# [repository.documentation.check_overrides]
# build-succeeds = "scripts/build-succeeds.sh"
# specs-compile = "scripts/specs-compile.sh"

[repository.implementation]
# Read by Coverage/Consistency pipeline checks as the source root (resolves
# to "crates" for this repo via .env — a workspace, not a single "src/").
dir = "${SAMGRAHA_IMPLEMENTATION_DIR}"

[repository.scripts]
dir = "${SAMGRAHA_SCRIPTS_DIR}"

[repository.tests]
dir = "${SAMGRAHA_TESTS_DIR}"

[compilation.documentation]
standards = []

[pipelines]
version = "1.0"

[resolver]
metadata_cache = true
metadata_ttl = "24h"
knowledge_ttl = "720h"
auto_refresh = true
registry_type = "file"

[pipelines.build]
command = ["cargo", "build", "--release", "-p", "cli"]
working_directory = "${PROJECT_ROOT}"
artifacts = ["${PROJECT_ROOT}/target/release/cli.exe"]
description = "Build the release CLI binary"
produces = ["release binary"]
consumes = ["source code", "dependencies"]

[knowledge]
dependencies = []
interests = []

[pipelines.test]
command = ["pwsh", "-File", "scripts/test-coverage.ps1"]
working_directory = "${PROJECT_ROOT}"
artifacts = ["docs/report/test-results.json"]
description = "Run unit+e2e tests with cargo-llvm-cov, emit structured TestRunReport JSON (docs/raw/audit/test-report-schema.md)"
produces = ["test results", "coverage report"]
consumes = ["source code"]

[ai]

[pipelines.mcp_multirepo_test]
command = ["pwsh", "-File", "scripts/run-tests.ps1", "-WithMCP", "-SkipBuild"]
working_directory = "${PROJECT_ROOT}"
artifacts = ["docs/report/manual-audit/tests/latest/04b-phase2b.md"]
description = "MCP repo_path targeting: proves init/compile/register_repository/search can target a repo other than the one the MCP server is anchored to (docs/errors-list/2026-07-08-mcp-init-targets-server-not-caller.md, 2026-07-08-no-global-repo-registration.md)"
produces = ["test results"]
consumes = ["mcp binary", "source code"]

[compilation]
watch = false
debounce_ms = 100
batch_size = 100

[audit.gates]
# Per-pipeline score thresholds for the Verify phase.
# Uncomment and set min_score to override the default 70.0 threshold.
# Example:
# architecture = { min_score = 85 }
# engineering = { min_score = 70 }
# vision = { min_score = 90 }

[audit]
default-severity = "suggestion"
default_severity = "suggestion"
providers = ["deterministic"]

[output]
format = "text"
color = true

[report]
# Base dir for generated reports (e.g. `samgraha audit --report`).
# Falls back to docs/raw/reports if SAMGRAHA_REPORT_DIR is unset.
dir = "${SAMGRAHA_REPORT_DIR}"
